<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Life Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', sans-serif;
      background: #ffffff;
      color: #09090b;
      padding: 2.5rem;
      max-width: 960px;
      margin: 0 auto;
    }
    h1 { font-size: 1.5rem; font-weight: 600; letter-spacing: -0.025em; }
    .subtitle { color: #71717a; margin-top: 0.25rem; margin-bottom: 2.5rem; font-size: 0.875rem; }
    .metric-card {
      border: 1px solid #e4e4e7;
      border-radius: 8px;
      padding: 1.25rem 1.5rem;
      margin-bottom: 1.25rem;
    }
    .metric-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1rem;
    }
    .metric-title {
      font-size: 0.875rem;
      font-weight: 500;
      color: #09090b;
    }
    .metric-latest {
      font-size: 0.875rem;
      color: #71717a;
    }
    .no-data {
      color: #a1a1aa;
      font-size: 0.8rem;
      padding: 1.5rem;
      text-align: center;
    }
    canvas { max-height: 200px; }
  </style>
</head>
<body>
  <h1>Life Dashboard</h1>
  <p class="subtitle">Track what matters.</p>
  <div id="dashboard"></div>

  <script>
    async function loadConfig() {
      const resp = await fetch('tracking/config.json');
      return resp.json();
    }

    async function loadCSV(file) {
      try {
        const resp = await fetch('tracking/' + file);
        if (!resp.ok) return [];
        const text = await resp.text();
        const lines = text.trim().split('\n').slice(1);
        return lines
          .map(line => {
            const parts = line.split(',');
            return { date: parts[0].trim(), value: parseFloat(parts[1].trim()) };
          })
          .filter(d => !isNaN(d.value) && d.date);
      } catch { return []; }
    }

    function weeklyCount(data) {
      const weeks = {};
      data.forEach(d => {
        const date = new Date(d.date);
        const weekStart = new Date(date);
        weekStart.setDate(date.getDate() - date.getDay() + 1);
        const key = weekStart.toISOString().split('T')[0];
        weeks[key] = (weeks[key] || 0) + 1;
      });
      return Object.entries(weeks)
        .map(([date, value]) => ({ date, value }))
        .sort((a, b) => a.date.localeCompare(b.date));
    }

    function renderMetric(metric, data, container) {
      const card = document.createElement('div');
      card.className = 'metric-card';

      const isAggregate = metric.aggregate === 'weekly-count';
      const chartData = isAggregate ? weeklyCount(data) : data;

      if (chartData.length === 0) {
        card.innerHTML = `
          <div class="metric-header">
            <span class="metric-title">${metric.name}</span>
          </div>
          <div class="no-data">No data yet</div>`;
        container.appendChild(card);
        return;
      }

      const latest = chartData[chartData.length - 1];
      const canvasId = 'chart-' + metric.id;

      card.innerHTML = `
        <div class="metric-header">
          <span class="metric-title">${metric.name}</span>
          <span class="metric-latest">${latest.value % 1 === 0 ? latest.value : latest.value.toFixed(1)} ${metric.unit}</span>
        </div>
        <canvas id="${canvasId}"></canvas>`;
      container.appendChild(card);

      const datasets = [{
        label: metric.name,
        data: chartData.map(d => ({ x: d.date, y: d.value })),
        borderColor: metric.color,
        backgroundColor: isAggregate ? metric.color + '33' : metric.color + '0d',
        fill: !isAggregate,
        tension: 0.4,
        pointRadius: chartData.length > 30 ? 1 : 3,
        pointBackgroundColor: metric.color,
        borderWidth: 1.5,
      }];

      if (metric.goal != null) {
        const allDates = chartData.map(d => d.date);
        datasets.push({
          label: 'Goal',
          data: allDates.map(d => ({ x: d, y: metric.goal })),
          borderColor: '#d4d4d8',
          borderDash: [4, 4],
          pointRadius: 0,
          borderWidth: 1,
          fill: false,
        });
      }

      const values = chartData.map(d => d.value);
      const minVal = Math.min(...values, metric.goal ?? Infinity);
      const maxVal = Math.max(...values, metric.goal ?? -Infinity);
      const padding = (maxVal - minVal) * 0.2 || 1;

      new Chart(document.getElementById(canvasId), {
        type: isAggregate ? 'bar' : 'line',
        data: { datasets },
        options: {
          responsive: true,
          interaction: { intersect: false, mode: 'index' },
          scales: {
            x: {
              type: 'time',
              time: { unit: chartData.length > 60 ? 'month' : 'week', tooltipFormat: 'MMM d, yyyy' },
              grid: { display: false },
              ticks: { color: '#a1a1aa', font: { size: 11 } },
              border: { display: false },
            },
            y: {
              min: Math.floor(minVal - padding),
              max: Math.ceil(maxVal + padding),
              grid: { color: '#f4f4f5' },
              ticks: { color: '#a1a1aa', font: { size: 11 } },
              border: { display: false },
            },
          },
          plugins: {
            legend: { display: false },
            tooltip: {
              backgroundColor: '#09090b',
              titleFont: { size: 12 },
              bodyFont: { size: 12 },
              padding: 8,
              cornerRadius: 6,
              displayColors: false,
              callbacks: {
                label: ctx => ctx.parsed.y + ' ' + metric.unit,
              },
            },
          },
        },
      });
    }

    async function render() {
      const config = await loadConfig();
      const dashboard = document.getElementById('dashboard');
      for (const metric of config) {
        const data = await loadCSV(metric.file);
        renderMetric(metric, data, dashboard);
      }
    }

    render();
  </script>
</body>
</html>
